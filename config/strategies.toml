# claude-trader strategy router configuration
# Maps tickers to strategies and points each strategy to its config file.
# Used by scheduler.py when this file exists (falls back to wheel.toml otherwise).

[router]
default_strategy = "wheel"

[router.assignments]
# Wheel — sell cash-secured puts / covered calls
NVDA   = "wheel"
AAPL   = "wheel"
MSFT   = "wheel"
AMZN   = "wheel"
GOOGL  = "wheel"
META   = "wheel"
TSLA   = "wheel"
INTC   = "wheel"
MU     = "wheel"

# Put Credit Spreads
SPY  = "put_credit_spread"
QQQ  = "put_credit_spread"
IWM  = "put_credit_spread"

# RSI(2) ETF basket (Phase B2)
EEM  = "rsi2"
EFA  = "rsi2"
TLT  = "rsi2"
GLD  = "rsi2"

# Red-Day CSP — sell puts on sentiment dips, reject fundamental breaks
AMD  = "red_day_csp"
AVGO = "red_day_csp"
ORCL = "red_day_csp"

[scheduler]
adapter      = "alpaca"
run_hour     = 9
run_minute   = 35
timezone     = "America/New_York"
# Phase 10: place paper orders automatically for actionable signals.
# Every order is gated by [risk] first; set false to log signals only.
auto_execute = true

# Phase 10 — risk limits, enforced before EVERY order the system places
[risk]
enabled                  = true
max_position_pct         = 5.0    # capital per new position, % of account equity
max_positions_total      = 10     # max concurrent open positions
max_positions_per_ticker = 1      # max concurrent positions per underlying
min_buying_power_pct     = 20.0   # % of equity kept free after any new trade

# Phase 9 — exit rules, evaluated on open short-option positions BEFORE new entries
[exit_rules]
enabled            = true
profit_target_pct  = 50.0   # close when >= this % of premium has decayed
dte_close          = 21     # close anything at or under this many days to expiry
stop_loss_multiple = 2.0    # close when mark >= this multiple of premium collected

[strategies.wheel]
config_path = "config/wheel.toml"

[strategies.put_credit_spread]
config_path = "config/put_credit_spread.toml"

[strategies.rsi2]
config_path = "config/rsi2.toml"

[strategies.red_day_csp]
config_path = "config/red_day_csp.toml"
