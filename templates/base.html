<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Wheel Trader{% endblock %}</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --border:   #30363d;
      --text:     #e6edf3;
      --muted:    #8b949e;
      --green:    #3fb950;
      --red:      #f85149;
      --yellow:   #d29922;
      --blue:     #58a6ff;
      --purple:   #bc8cff;
    }

    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", monospace; font-size: 14px; }

    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 24px;
      height: 52px;
    }
    nav .brand { font-weight: 700; font-size: 16px; color: var(--text); text-decoration: none; letter-spacing: .5px; }
    nav a { color: var(--muted); text-decoration: none; font-size: 13px; }
    nav a:hover { color: var(--text); }
    nav .spacer { flex: 1; }

    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }

    h1 { font-size: 20px; font-weight: 600; margin-bottom: 20px; }
    h2 { font-size: 16px; font-weight: 600; margin-bottom: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .5px;
    }
    .badge-A    { background: #1f3a5f; color: var(--blue); }
    .badge-B    { background: #2d1f5f; color: var(--purple); }
    .badge-put  { background: #1a3a22; color: var(--green); }
    .badge-call { background: #3a1f2d; color: var(--purple); }
    .badge-none { background: #2a2a2a; color: var(--muted); }
    .badge-HIGH   { background: #1a3a22; color: var(--green); }
    .badge-MEDIUM { background: #3a2e0a; color: var(--yellow); }
    .badge-LOW    { background: #3a1a1a; color: var(--red); }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }
    .card:hover { border-color: #58a6ff55; }

    .card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .card-ticker { font-size: 20px; font-weight: 700; }
    .card-body   { display: flex; flex-direction: column; gap: 6px; }
    .card-row    { display: flex; justify-content: space-between; color: var(--muted); font-size: 13px; }
    .card-row span:last-child { color: var(--text); font-weight: 500; }
    .card-actions { margin-top: 14px; display: flex; gap: 8px; }

    .btn {
      padding: 5px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      background: transparent;
      color: var(--text);
    }
    .btn:hover  { background: var(--border); }
    .btn-blue   { border-color: var(--blue);   color: var(--blue); }
    .btn-blue:hover { background: #1f3a5f; }
    .btn-green  { border-color: var(--green);  color: var(--green); }
    .btn-green:hover { background: #1a3a22; }
    .btn-red    { border-color: var(--red);    color: var(--red); }
    .btn-red:hover { background: #3a1a1a; }

    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 8px 12px; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid var(--border); }
    td { padding: 10px 12px; border-bottom: 1px solid #21262d; font-size: 13px; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #1c2128; }

    .chart-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 24px; }

    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 24px; width: 340px; }
    .modal h3 { margin-bottom: 16px; font-size: 15px; }
    .modal label { display: block; margin-bottom: 4px; color: var(--muted); font-size: 12px; }
    .modal input {
      width: 100%; padding: 8px 10px; background: var(--bg);
      border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); font-size: 14px; margin-bottom: 14px;
    }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

    .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
    .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
    .stat-value { font-size: 22px; font-weight: 700; }

    .flash { padding: 10px 16px; border-radius: 6px; margin-bottom: 16px; font-size: 13px; }
    .flash-ok  { background: #1a3a22; color: var(--green); border: 1px solid #2ea043; }
    .flash-err { background: #3a1a1a; color: var(--red);   border: 1px solid #f85149; }

    .back-link { color: var(--muted); text-decoration: none; font-size: 13px; display: inline-flex; align-items: center; gap: 4px; margin-bottom: 16px; }
    .back-link:hover { color: var(--text); }
  </style>
</head>
<body>
<nav>
  <a class="brand" href="/">Wheel Trader</a>
  <a href="/">Dashboard</a>
  <div class="spacer"></div>
</nav>
<div class="container">
  {% block content %}{% endblock %}
</div>
{% block scripts %}{% endblock %}
</body>
</html>
